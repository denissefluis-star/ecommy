<html>
<head>
   <title>Form Sederhana</title>
   <link rel="stylesheet" style ="text/css" href="Form.css">
	
</head>
<body>
  <div class="container" role="region" aria-labelledby="title">
    <h1 id="title">Kontak Singkat</h1>
    <form action="#" method="post" novalidate>
	  <label for="name">Nama *</label>
	  <input id="name" name="name" type="text" placeholder="Nama lengkap" required>
	  
	  <label for="email">Email *</label>
	  <input id="email" name="email" type="email" placeholder="email@contoh.com" required>
	  
	  <label for="message">Pesan *</label>
	  <textarea id="message" name="message" placeholder="Tulis pesan..." required></textarea>
	  
	  <button type="submit">Kirim</button>
	  <div class="note">Semua field bertanda * wajib diisi.</div>
    </form>
  </div>
</body>
</html>
